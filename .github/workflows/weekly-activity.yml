name: Update Weekly Activity

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build weekly activity summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const username = "kpulik";
            const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
            const response = await github.request("GET /users/{username}/events/public", {
              username,
              per_page: 100
            });

            const events = response.data.filter((event) => new Date(event.created_at) >= weekAgo);
            const total = events.length;

            const countByType = {
              PushEvent: 0,
              PullRequestEvent: 0,
              IssuesEvent: 0,
              IssueCommentEvent: 0,
              PullRequestReviewEvent: 0
            };

            const repoCounts = new Map();

            for (const event of events) {
              if (Object.prototype.hasOwnProperty.call(countByType, event.type)) {
                countByType[event.type] += 1;
              }

              const repoName = event.repo?.name;
              if (repoName) {
                repoCounts.set(repoName, (repoCounts.get(repoName) || 0) + 1);
              }
            }

            const topRepos = [...repoCounts.entries()]
              .sort((a, b) => b[1] - a[1])
              .slice(0, 3);

            const lines = [];
            lines.push(`- Updated: ${new Date().toISOString().slice(0, 10)}`);
            lines.push(`- Public events in last 7 days: **${total}**`);
            lines.push(`- Pushes: **${countByType.PushEvent}**`);
            lines.push(`- Pull requests opened or updated: **${countByType.PullRequestEvent}**`);
            lines.push(`- Issues and comments: **${countByType.IssuesEvent + countByType.IssueCommentEvent}**`);
            lines.push(`- PR reviews: **${countByType.PullRequestReviewEvent}**`);

            if (topRepos.length > 0) {
              lines.push("- Most active repos this week:");
              for (const [repo, count] of topRepos) {
                lines.push(`  - ${repo}: ${count} event(s)`);
              }
            } else {
              lines.push("- Most active repos this week: no public activity captured yet.");
            }

            fs.writeFileSync("weekly-activity.md", lines.join("\n") + "\n");

      - name: Inject summary into README
        run: |
          python3 - <<'PY'
          import pathlib
          import re

          readme_path = pathlib.Path("README.md")
          summary_path = pathlib.Path("weekly-activity.md")

          start_marker = "<!--START_SECTION:weekly-activity-->"
          end_marker = "<!--END_SECTION:weekly-activity-->"

          readme = readme_path.read_text(encoding="utf-8")
          summary = summary_path.read_text(encoding="utf-8").strip()

          if start_marker not in readme or end_marker not in readme:
            raise SystemExit("README weekly activity markers are missing.")

          block = f"{start_marker}\n{summary}\n{end_marker}"
          pattern = f"{re.escape(start_marker)}[\\s\\S]*?{re.escape(end_marker)}"

          updated = re.sub(pattern, block, readme)
          readme_path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet README.md; then
            echo "No README changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update weekly activity summary"
          git push
